version: '3.8'

services:
  # MySQL
  mysql:
    image: mysql:8.0
    container_name: aiduanju-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-aiduanju}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

  # Laravel Backend
  backend:
    build: ./backend
    container_name: aiduanju-backend
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY:-base64:placeholder}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-aiduanju}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      KLING_API_KEY: ${KLING_API_KEY:-}
      KLING_API_SECRET: ${KLING_API_SECRET:-}
      COSYVOICE_API_KEY: ${COSYVOICE_API_KEY:-}
      COSYVOICE_API_BASE: ${COSYVOICE_API_BASE:-https://dashscope.aliyuncs.com/api/v1}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - backend_storage:/var/www/storage

  # Vue3 Frontend (dev mode)
  frontend:
    image: node:20-alpine
    container_name: aiduanju-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_BASE: http://localhost:8000

volumes:
  mysql_data:
  backend_storage:
